steps:
  # Step 1: Pull previous image for Docker layer cache
  - name: 'gcr.io/cloud-builders/docker'
    id: 'pull-cache'
    args:
      - 'pull'
      - 'us-west1-docker.pkg.dev/osu-genesis-hub/cloud-run-source-deploy/openbeavs-frontend:latest'
    allowFailure: true

  # Step 2: Build from repo root using the root Dockerfile
  # This builds the SvelteKit frontend (npm run build:copy) and bundles
  # it with the Python/uvicorn backend into a single image.
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    waitFor: ['pull-cache']
    args:
      - 'build'
      - '--cache-from'
      - 'us-west1-docker.pkg.dev/osu-genesis-hub/cloud-run-source-deploy/openbeavs-frontend:latest'
      - '-t'
      - 'us-west1-docker.pkg.dev/osu-genesis-hub/cloud-run-source-deploy/openbeavs-frontend:$COMMIT_SHA'
      - '-t'
      - 'us-west1-docker.pkg.dev/osu-genesis-hub/cloud-run-source-deploy/openbeavs-frontend:latest'
      - '.'

  # Step 3: Push both tags to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    waitFor: ['build']
    args:
      - 'push'
      - '--all-tags'
      - 'us-west1-docker.pkg.dev/osu-genesis-hub/cloud-run-source-deploy/openbeavs-frontend'

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    waitFor: ['push']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'openbeavs-deploy-test'
      - '--image=us-west1-docker.pkg.dev/osu-genesis-hub/cloud-run-source-deploy/openbeavs-frontend:$COMMIT_SHA'
      - '--region=us-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--execution-environment=gen2'
      - '--memory=8Gi'
      - '--cpu=4'
      - '--port=8080'
      - '--timeout=600'
      - '--set-env-vars=HOST=0.0.0.0,WEBUI_SECRET_KEY=change-me-in-prod,OFFLINE_MODE=true,ENV=prod,RAG_EMBEDDING_MODEL_AUTO_UPDATE=false,RAG_RERANKING_MODEL_AUTO_UPDATE=false,BYPASS_EMBEDDING_AND_RETRIEVAL=true,BYPASS_WEB_SEARCH_EMBEDDING_AND_RETRIEVAL=true,WHISPER_MODEL_AUTO_UPDATE=false,OPENBEAVS_CLOUD_RUN_DISABLED=1'
      # Service account with Cloud SQL client + Secret Manager accessor roles
      - '--service-account=genesis-ai-hub-sa@osu-genesis-hub.iam.gserviceaccount.com'
      # Cloud SQL Auth Proxy — enables Unix socket at /cloudsql/INSTANCE_CONNECTION_NAME
      - '--add-cloudsql-instances=osu-genesis-hub:us-west1:genesis-ai-hub-db-west1'
      # DATABASE_URL is injected from Secret Manager (password never in plaintext here)
      # Microsoft SSO credentials also come from Secret Manager
      - '--set-secrets=DATABASE_URL=database-url:latest,MICROSOFT_CLIENT_ID=microsoft-client-id:latest,MICROSOFT_CLIENT_SECRET=microsoft-client-secret:latest,MICROSOFT_CLIENT_TENANT_ID=microsoft-tenant-id:latest'
      # Application environment variables
      - '--set-env-vars=HOST=0.0.0.0,ENV=prod,OFFLINE_MODE=true,RAG_EMBEDDING_MODEL_AUTO_UPDATE=false,RAG_RERANKING_MODEL_AUTO_UPDATE=false,BYPASS_EMBEDDING_AND_RETRIEVAL=true,BYPASS_WEB_SEARCH_EMBEDDING_AND_RETRIEVAL=true,WHISPER_MODEL_AUTO_UPDATE=false,DATABASE_POOL_SIZE=2,DATABASE_POOL_MAX_OVERFLOW=4,ENABLE_OAUTH_SIGNUP=true,OAUTH_MERGE_ACCOUNTS_BY_EMAIL=true,MICROSOFT_OAUTH_SCOPE=openid email profile,MICROSOFT_REDIRECT_URI=https://openbeavs-deploy-test-716080272371.us-west1.run.app/oauth/microsoft/callback'
      - '--cpu-boost'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
